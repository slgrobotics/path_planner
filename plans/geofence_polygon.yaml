geofence:
  source_name: home_geofence
  reference_frame: local_cartesian

  polygons:
    - zone_name: home_area
      inclusion: true
      points:
        - {x: -3.5, y: -3.5}
        - {x: -3.5, y:  3.5}
        - {x:  3.5, y:  3.5}
        - {x:  3.5, y: -3.5}

    - zone_name: pond_exclusion
      inclusion: false
      points:
        - {x: -1.2, y: -0.9}
        - {x: -0.6, y: -1.0}
        - {x: -0.4, y: -0.3}
        - {x: -1.1, y: -0.2}

  circles:
    - zone_name: tree_keepout
      inclusion: false
      center: {x: 2.0, y: 1.0}
      radius_m: 0.5

    - zone_name: docking_area
      inclusion: true
      center: {x: -3.5, y: 3.5}
      radius_m: 1.0

  breach_return:
    point: {x: 0.0, y: 3.8}
    altitude_m: 0.0
